# GitLab Pages — deploys index.html + data/ to https://ignitedmind28.gitlab.io/world-quiz/
# Azure TTS falls back to Web Speech API on Pages (config.js is git-ignored by design).
# To enable Azure TTS on Pages, set AZURE_KEY and AZURE_REGION as CI/CD variables in
# GitLab → Settings → CI/CD → Variables, then uncomment the two lines below.

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html public/
    - cp -r data public/
    - cp config.example.js public/config.js
    # Uncomment to inject Azure key from CI/CD variable (Settings → CI/CD → Variables):
    # - sed -i "s/YOUR_AZURE_KEY_HERE/$AZURE_KEY/" public/config.js
    # - sed -i "s/YOUR_AZURE_REGION_HERE/$AZURE_REGION/" public/config.js
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
