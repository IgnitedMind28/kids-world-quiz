# GitLab Pages — deploys to https://ignitedmind28.gitlab.io/world-quiz/
# Azure credentials are injected from CI/CD variables (never stored in the repo).
# Add AZURE_KEY and AZURE_REGION at: Settings → CI/CD → Variables

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html public/
    - cp -r data public/
    - cp config.example.js public/config.js
    - sed -i "s|YOUR_AZURE_KEY_HERE|$AZURE_KEY|" public/config.js
    - sed -i "s|YOUR_AZURE_REGION_HERE|$AZURE_REGION|" public/config.js
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
