<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Explorer 🌍</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Nunito', sans-serif;
      background:
        radial-gradient(ellipse 70% 50% at 12% 25%, rgba(72, 18, 130, 0.35) 0%, transparent 65%),
        radial-gradient(ellipse 55% 55% at 88% 75%, rgba(10, 50, 110, 0.4) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 55% 10%, rgba(20, 10, 60, 0.5) 0%, transparent 70%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #060c1a 0%, #02060e 100%);
      color: #fff;
      overflow: hidden;
      height: 100vh;
      width: 100vw
    }

    .tf {
      font-family: 'Fredoka One', cursive
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0
    }

    #app {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 20px 16px
    }

    /* ── BUTTONS ── */
    .btn-main {
      background: linear-gradient(135deg, #00c6fb, #005bea);
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      color: #fff;
      border: none;
      padding: 16px 52px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(0, 198, 251, 0.45);
      transition: transform 0.15s
    }

    .btn-main:hover {
      transform: scale(1.05)
    }

    .btn-gold {
      background: linear-gradient(135deg, #f9c74f, #f3722c);
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      color: #fff;
      border: none;
      padding: 14px 44px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(249, 199, 79, 0.45);
      transition: transform 0.15s
    }

    .btn-gold:hover {
      transform: scale(1.05)
    }

    .btn-green {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      font-family: 'Fredoka One', cursive;
      font-size: 19px;
      color: #064e3b;
      border: none;
      padding: 13px 40px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(67, 233, 123, 0.4);
      transition: transform 0.15s
    }

    .btn-green:hover {
      transform: scale(1.05)
    }

    .btn-outline {
      background: rgba(255, 255, 255, 0.08);
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      color: #e0f2fe;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 11px 28px;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s
    }

    .btn-outline:hover {
      transform: scale(1.04);
      background: rgba(255, 255, 255, 0.13)
    }

    /* ── GLASS CARD ── */
    .glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 24px;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.1)
    }

    /* ── GLOBE ── */
    .globe {
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at 33% 28%, #64b5f6 0%, #1565c0 40%, #0a3d8f 70%, #020d2e 100%);
      box-shadow: inset -14px -10px 40px rgba(0, 0, 0, 0.6), inset 6px 6px 24px rgba(255, 255, 255, 0.1), 0 0 80px rgba(79, 195, 247, 0.25), 0 20px 50px rgba(0, 0, 0, 0.6)
    }

    .globe-shine {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.05) 35%, transparent 60%);
      z-index: 10;
      pointer-events: none
    }

    .land {
      position: absolute;
      background: #2e7d32;
      opacity: 0.85
    }

    .l-eu {
      width: 42%;
      height: 36%;
      top: 16%;
      left: 33%;
      border-radius: 40% 60% 50% 45%/55% 40% 65% 45%
    }

    .l-af {
      width: 22%;
      height: 30%;
      top: 40%;
      left: 52%;
      border-radius: 40% 35% 50% 38%/28% 52% 48% 58%
    }

    .l-na {
      width: 23%;
      height: 27%;
      top: 16%;
      left: 7%;
      border-radius: 45% 55% 50% 40%/50% 38% 60% 48%
    }

    .l-sa {
      width: 16%;
      height: 24%;
      top: 52%;
      left: 14%;
      border-radius: 48% 35% 42% 52%/40% 58% 38% 56%
    }

    .l-au {
      width: 16%;
      height: 14%;
      top: 63%;
      left: 73%;
      border-radius: 42% 58% 48% 52%/52% 44% 58% 44%
    }

    .globe-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120%;
      height: 20%;
      border: 2px solid rgba(79, 195, 247, 0.22);
      border-radius: 50%;
      transform: translate(-50%, -50%) rotateX(75deg);
      pointer-events: none
    }

    .map-pin {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #f72585;
      border-radius: 50% 50% 50% 0%;
      transform: rotate(-45deg);
      border: 3px solid #fff;
      box-shadow: 0 4px 10px rgba(247, 37, 133, 0.6)
    }

    @keyframes globeSpin {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    .globe-spin .land {
      animation: globeSpin 3s linear infinite;
      transform-origin: center center
    }

    /* ── CARD TABLE ── */
    @keyframes cardBob {

      0%,
      100% {
        transform: rotate(0deg) translateY(-28px)
      }

      50% {
        transform: rotate(0deg) translateY(-42px)
      }
    }

    @keyframes cardGlow {

      0%,
      100% {
        box-shadow: 0 0 32px rgba(249, 199, 79, .6), 0 0 0 5px rgba(249, 199, 79, .14), 0 14px 36px rgba(0, 0, 0, .55)
      }

      50% {
        box-shadow: 0 0 70px rgba(249, 199, 79, .98), 0 0 0 10px rgba(249, 199, 79, .28), 0 14px 36px rgba(0, 0, 0, .55)
      }
    }

    @keyframes sparkle {

      0%,
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg)
      }

      50% {
        opacity: .25;
        transform: scale(0.4) rotate(35deg)
      }
    }

    /* ── CHARACTER ── */
    @keyframes qmBurstIn {
      0% {
        transform: scale(0.08);
        opacity: 0;
        filter: blur(18px)
      }

      35% {
        filter: blur(3px);
        opacity: 1
      }

      65% {
        transform: scale(1.08) translateY(-8px);
        filter: blur(0)
      }

      82% {
        transform: scale(0.97) translateY(2px)
      }

      100% {
        transform: scale(1) translateY(0)
      }
    }

    @keyframes qmFloat {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    @keyframes qmBreath {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.025)
      }
    }

    @keyframes qmSway {

      0%,
      100% {
        transform: rotate(-2deg)
      }

      50% {
        transform: rotate(2deg)
      }
    }

    @keyframes globeZoom {
      0% {
        transform: scale(1);
        opacity: 1
      }

      70% {
        transform: scale(4);
        opacity: 0.6
      }

      100% {
        transform: scale(9);
        opacity: 0
      }
    }

    .qm-burst {
      animation: qmBurstIn 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) both
    }

    .qm-float {
      animation: qmFloat 3s ease-in-out infinite
    }

    .qm-talk {
      animation: qmBreath 2.8s ease-in-out infinite
    }

    .qm-happy {
      animation: qmSway 1.4s ease-in-out infinite
    }

    .globe-zooming {
      animation: globeZoom 0.85s cubic-bezier(0.55, 0, 0.8, 0) forwards;
      pointer-events: none
    }

    /* ── SPEECH BUBBLE ── */
    .bubble {
      position: relative;
      background: #fff;
      border-radius: 20px;
      padding: 18px 22px;
      color: #1e293b;
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.4)
    }

    .bubble::before {
      content: '';
      position: absolute;
      left: -18px;
      top: 28px;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-right: 20px solid #fff
    }

    @keyframes bubblePop {
      0% {
        transform: scale(0.5) translateX(-20px);
        opacity: 0
      }

      70% {
        transform: scale(1.04) translateX(2px)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    .bubble-pop {
      animation: bubblePop 0.5s cubic-bezier(.34, 1.56, .64, 1) both
    }

    @keyframes btnPopIn {
      0% {
        transform: scale(0.25) translateY(24px);
        opacity: 0
      }

      55% {
        transform: scale(1.14) translateY(-5px);
        opacity: 1
      }

      78% {
        transform: scale(0.96) translateY(2px)
      }

      100% {
        transform: scale(1) translateY(0);
        opacity: 1
      }
    }

    .quiz-btn-pop {
      animation: btnPopIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 18px;
      background: #3b82f6;
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 0.8s step-end infinite
    }

    /* ── ANSWERS ── */
    .opt {
      background: rgba(255, 255, 255, 0.07);
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 800;
      font-size: 15px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 11px;
      transition: border-color 0.2s, background 0.2s;
      backdrop-filter: blur(8px)
    }

    .opt:not(.locked):hover {
      border-color: rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.12)
    }

    .opt.correct {
      background: rgba(34, 197, 94, 0.2);
      border-color: #22c55e;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.3)
    }

    .opt.wrong {
      background: rgba(239, 68, 68, 0.15);
      border-color: #ef4444
    }

    .opt-pill {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: 13px;
      flex-shrink: 0
    }

    .opt.correct .opt-pill {
      background: #22c55e
    }

    .opt.wrong .opt-pill {
      background: #ef4444
    }

    /* ── PROGRESS DOTS ── */
    .pdot {
      width: 13px;
      height: 13px;
      border-radius: 50%
    }

    .pdot-done {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, .6)
    }

    .pdot-active {
      background: #f9c74f;
      box-shadow: 0 0 10px rgba(249, 199, .7)
    }

    .pdot-todo {
      background: rgba(255, 255, 255, .2)
    }

    /* ── CONFETTI ── */
    .cf {
      position: absolute;
      border-radius: 3px;
      animation: cfFall linear infinite
    }

    @keyframes cfFall {
      0% {
        transform: translateY(-30px) rotate(0deg);
        opacity: 1
      }

      100% {
        transform: translateY(600px) rotate(720deg);
        opacity: 0
      }
    }

    /* ── CONTINENT CARDS ── */
    .cont-card {
      border-radius: 20px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s
    }

    .cont-card:hover {
      transform: scale(1.06);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.3)
    }

    /* ── STAR TIERS ── */
    @keyframes twinkleSm {

      0%,
      100% {
        opacity: .25
      }

      50% {
        opacity: .06
      }
    }

    @keyframes twinkleMd {

      0%,
      100% {
        opacity: .75;
        transform: scale(1)
      }

      45% {
        opacity: .2;
        transform: scale(0.85)
      }

      100% {
        opacity: .75;
        transform: scale(1)
      }
    }

    @keyframes twinkleLg {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px 2px var(--sc)
      }

      40% {
        opacity: .35;
        box-shadow: 0 0 2px 0 var(--sc)
      }

      75% {
        opacity: .9;
        box-shadow: 0 0 10px 4px var(--sc)
      }
    }

    @keyframes twinkleHero {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 16px 5px var(--sc), 0 0 40px 12px var(--sc2), 0 0 0 0 transparent
      }

      50% {
        opacity: .6;
        box-shadow: 0 0 8px 2px var(--sc), 0 0 20px 5px var(--sc2), 0 0 0 0 transparent
      }
    }

    @keyframes shootStar {
      0% {
        transform: translate(0, 0) rotate(-35deg);
        opacity: 1
      }

      100% {
        transform: translate(280px, 180px) rotate(-35deg);
        opacity: 0
      }
    }

    /* ── PLANET ORBS (celebrity cards) ── */
    @keyframes orbitPulse {

      0%,
      100% {
        opacity: .45;
        transform: scale(1) rotateX(68deg)
      }

      50% {
        opacity: .85;
        transform: scale(1.07) rotateX(68deg)
      }
    }

    @keyframes orbGlow {

      0%,
      100% {
        box-shadow: 0 0 18px 6px var(--og), 0 0 50px 16px var(--og2)
      }

      50% {
        box-shadow: 0 0 32px 12px var(--og), 0 0 80px 28px var(--og2)
      }
    }

    /* Misc */
    .glow {
      color: #e0f2fe;
      text-shadow: 0 0 40px rgba(0, 198, 251, 0.5), 0 0 80px rgba(0, 198, 251, 0.2)
    }

    /* ── EASTER BASKET — TOP-DOWN VIEW ─────────────────────── */

    /* Outer container — sizes the whole basket */
    #basket-wrap {
      position: relative;
      width: min(430px, 88vw);
      height: min(430px, 88vw);
      margin: 0 auto;
      flex-shrink: 0;
    }

    /* Woven rim ring — repeating-conic gives a real wicker look */
    #basket-rim-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: repeating-conic-gradient(
        #78350f 0% 8.33%,
        #a16207 8.33% 16.66%
      );
      box-shadow: 0 22px 64px rgba(0,0,0,0.7),
                  0 0 0 3px #4a1f00,
                  inset 0 3px 10px rgba(255,255,255,0.08);
    }

    /* Inner circle — the basket interior (overflow:hidden clips eggs) */
    #basket-circle {
      position: absolute;
      inset: 26px;        /* rim width */
      border-radius: 50%;
      background: radial-gradient(circle at 45% 40%,
        #2a5c23 0%, #1e4a19 50%, #122e0e 100%);
      overflow: hidden;
      cursor: crosshair;  /* overridden by hammer in JS */
    }

    /* Eggs — horizontal oval for top-down perspective, positioned by JS */
    .game-egg {
      position: absolute;
      width: 76px; height: 56px;
      border-radius: 50%;
      overflow: hidden;
      cursor: inherit;
      transition: filter 0.15s;
      box-shadow: 3px 5px 20px rgba(0,0,0,0.5),
                  inset 0 -2px 6px rgba(0,0,0,0.2);
    }

    .game-egg:hover:not(.egg-cracking):not(.egg-open) {
      filter: brightness(1.18) drop-shadow(0 0 10px rgba(255,230,100,0.7));
    }

    .egg-crack-svg {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
    }

    .egg-cracking .egg-crack-svg { opacity: 1; }

    /* Animations */
    @keyframes eggShakeThis {
      0%, 100% { transform: var(--egg-rot); }
      15%  { transform: var(--egg-rot) rotate(-14deg) translate(-2px,-5px); }
      35%  { transform: var(--egg-rot) rotate(16deg)  translate(2px,-7px);  }
      55%  { transform: var(--egg-rot) rotate(-12deg) translate(-1px,-5px); }
      75%  { transform: var(--egg-rot) rotate(9deg)   translate(1px,-2px);  }
    }

    @keyframes eggSurprise {
      0%, 100% { transform: var(--egg-rot); }
      30% { transform: var(--egg-rot) translate(0,-10px) scale(1.05); }
      65% { transform: var(--egg-rot) translate(0,-4px)  scale(1.02); }
    }

    @keyframes eggExplode {
      0%   { transform: var(--egg-rot) scale(1);    opacity: 1;   }
      28%  { transform: var(--egg-rot) scale(1.25); opacity: 1;   }
      62%  { transform: var(--egg-rot) scale(0.5);  opacity: 0.3; }
      100% { transform: var(--egg-rot) scale(0);    opacity: 0;   }
    }

    .egg-cracking  { animation: eggShakeThis 0.5s ease-in-out; }
    .egg-open      { animation: eggExplode   0.42s ease-in forwards; }
    .egg-surprised { animation: eggSurprise  0.6s ease-in-out; }

    /* Confetti particles */
    .egg-particle {
      position: absolute;
      pointer-events: none;
      z-index: 20;
      animation: particleFly 0.75s ease-out forwards;
    }

    @keyframes particleFly {
      0%   { transform: translate(0,0) scale(1) rotate(0deg);   opacity: 1; }
      100% { transform: translate(var(--pdx),var(--pdy)) scale(0) rotate(180deg); opacity: 0; }
    }

    /* Country reveal — centered in basket */
    #country-reveal {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      opacity: 0;
      z-index: 30;
      background: linear-gradient(160deg, #fffef0, #fff8e1);
      border: 3px solid #f9c74f;
      border-radius: 18px;
      padding: 16px 24px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55), 0 0 30px rgba(249,199,79,0.6);
      min-width: 150px;
      pointer-events: none;
      white-space: nowrap;
    }

    #country-reveal.reveal-open {
      animation: revealPop 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes revealPop {
      0%   { transform: translate(-50%,-50%) scale(0.1)  rotate(-6deg); opacity: 0; }
      55%  { transform: translate(-50%,-50%) scale(1.1)  rotate(2deg);  opacity: 1; }
      80%  { transform: translate(-50%,-50%) scale(0.97) rotate(-1deg); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1)    rotate(0deg);  opacity: 1; }
    }
  </style>
</head>

<body>
  <div id="stars"></div>
  <div id="app"></div>
  <button id="mute-btn" onclick="toggleMute()"
    style="position:fixed;bottom:18px;right:18px;z-index:9999;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.20);border-radius:50%;width:38px;height:38px;font-size:17px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;padding:0;transition:background 0.2s"
    onmouseover="this.style.background='rgba(255,255,255,0.18)'"
    onmouseout="this.style.background='rgba(255,255,255,0.10)'">🔊</button>
  <!-- Country database lives in data/countries-data.js — edit there to add countries, questions & celebrities -->
  <script src="data/celeb-imgs.js"></script>
  <script src="data/countries-data.js"></script>
  <!-- Azure credentials — loaded from config.js (git-ignored). See config.example.js. -->
  <script src="config.js" onerror="/* config.js not found — app falls back to Web Speech API */"></script>
  <script>
    // ═══════════════════════════════════════════════════════
    // GAME DATA
    // ═══════════════════════════════════════════════════════

    // Easter-egg colour palette — 10 vibrant pairs [gradient, stripeColor, dot1, dot2]
    // SVG Pysanka-style patterns — each fits a 76×56 viewBox (top-down oval egg)
    const EGG_SVG = [
      // 0. Pysanka Red — Ukrainian diamond lattice in gold
      `<rect width="76" height="56" fill="#c0392b"/>
       <path d="M0,28 L19,14 L38,0 L57,14 L76,28 L57,42 L38,56 L19,42 Z" fill="none" stroke="#f9ca24" stroke-width="2"/>
       <path d="M38,0 L38,56 M0,28 L76,28 M19,14 L57,42 M57,14 L19,42" stroke="#f9ca24" stroke-width="1" opacity="0.6"/>
       <circle cx="38" cy="28" r="5" fill="#f9ca24"/>
       <circle cx="19" cy="14" r="2.5" fill="#f9ca24"/><circle cx="57" cy="14" r="2.5" fill="#f9ca24"/>
       <circle cx="19" cy="42" r="2.5" fill="#f9ca24"/><circle cx="57" cy="42" r="2.5" fill="#f9ca24"/>`,

      // 1. Cobalt Blue — white snowflake star
      `<rect width="76" height="56" fill="#2471a3"/>
       <g transform="translate(38,28)" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none">
         <line x1="0" y1="-19" x2="0" y2="19"/><line x1="-19" y1="0" x2="19" y2="0"/>
         <line x1="-13" y1="-13" x2="13" y2="13"/><line x1="13" y1="-13" x2="-13" y2="13"/>

    function render() {
      const screens = { welcome, continentSelect, cardDraw, globe: globeSpin, quizIntro, quiz, scoreScreen };
      app.innerHTML = screens[S.screen]?.() ?? '';
      postRender();
    }

    // ── URL routing (hash-based) ──────────────────────────────────────────────
    // Maps current state → a URL hash so the page is bookmarkable / refresh-safe.
    function stateToHash() {
      const s = S.screen;
      if (s === 'continentSelect') return '#play';
      if (s === 'cardDraw' || s === 'globe')
        return S.continent ? `#play/${S.continent}` : '#play';
      if (s === 'quizIntro' || s === 'quiz' || s === 'scoreScreen') {
        if (S.country)   return `#play/${S.continent}/${S.country.id}`;
        if (S.continent) return `#play/${S.continent}`;
        return '#play';
      }
      return '#';
    }

    // Parses the current URL hash back into a partial state object.
    function hashToState() {
      const hash  = window.location.hash.replace(/^#\/?/, '');
      if (!hash) return { screen: 'welcome' };
      const parts = hash.split('/');
      if (parts[0] !== 'play') return { screen: 'welcome' };
      const continent = parts[1];
      if (!continent || !CONTINENTS.find(c => c.id === continent))
        return { screen: 'continentSelect' };
      const countryId = parts[2];
      if (!countryId) return { screen: 'cardDraw', continent, country: null };
      const country = COUNTRIES.find(c => c.id === countryId);
      if (!country) return { screen: 'cardDraw', continent, country: null };
      return { screen: 'quizIntro', continent, country };
    }

    function go(screen, extra = {}) {
      _cancelEgg();
      clearTimeout(go._t);
      Object.assign(S, extra, { screen });
      history.pushState(null, '', stateToHash());
      render();
    }
    go._t = null;

    function after(ms, screen, extra = {}) {
      clearTimeout(go._t);
      go._t = setTimeout(() => go(screen, extra), ms);
    }

    function postRender() {
      if (S.screen === 'cardDraw') { initBasket(); }
      if (S.screen === 'globe') {
        setTimeout(() => {
          const el = document.getElementById('globe-wrapper');
          if (el) el.classList.add('globe-zooming');
        }, 2300);
        after(3200, 'quizIntro');
      }
      if (S.screen === 'quizIntro' || S.screen === 'quiz') {
        if (!document.getElementById('celeb-bg')) showCelebBg(S.country);
      } else {
        const old = document.getElementById('celeb-bg');
        if (old) old.remove();
      }
      if (S.screen === 'quizIntro') {
        setTimeout(() => speakIntro(S.country), 600);
      } else {
        stopSpeech();
      }
      if (S.screen === 'quiz' && S.answered === null) startTypewriter();
      if (S.screen === 'scoreScreen' && S.score === 3) {
        startConfetti();
        if (!_celebPlayed) { _celebPlayed = true; playCelebration(); }
      }
      if (S.screen !== 'scoreScreen') _celebPlayed = false; // reset for next game
    }

    async function fetchWikiThumb(name) {
      try {
        const r = await fetch(
          `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(name)}&prop=pageimages&format=json&pithumbsize=320&origin=*`
        );
        const d = await r.json();
        const p = Object.values(d.query.pages)[0];
        return p?.thumbnail?.source ?? null;
      } catch { return null; }
    }

    function showCelebBg(country) {
      const old = document.getElementById('celeb-bg');
      if (old) old.remove();
      if (!country?.celebs?.length) return;

      const layer = document.createElement('div');
      layer.id = 'celeb-bg';
      layer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden';
      document.body.appendChild(layer);

      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const ORB_R = 64;   // half of 128px orb circle
      const RING_R = 75;   // half of 150px orbit ring
      const CARD_W = 138;  // card wrapper width
      const LABEL_H = 42;   // label height below orb

      // Two-column layout — left column (cx≈12% vw), right column (cx≈88% vw)
      // Clamped so the orbit ring (±75px) never clips the screen edge
      const leftX = Math.max(RING_R + 4, Math.round(vw * 0.12));
      const rightX = Math.min(vw - RING_R - 4, Math.round(vw * 0.88));

      // Three row y-centres that avoid the quiz-master character and buttons:
      //   Character centre ≈ (195, 215), radius ≈ 110px
      //   "Let's Go!" button  y ≈ 470–560
      //   topY  ≈ 10% vh  → above character, card-bottom well above 215-110=105  ✓
      //   midY  ≈ 41% vh  → below character (≥ 150px away at left/right x),
      //                      card-bottom ≤ 456px, safely above 470px button       ✓
      //   botY  ≈ 77% vh  → card-top ≈ 585px, safely below 560px button bottom   ✓
      const topY = Math.max(ORB_R + 8, Math.round(vh * 0.105));
      const midY = Math.round(vh * 0.415);
      const botY = Math.min(vh - ORB_R - LABEL_H - 8, Math.round(vh * 0.770));

      // Fixed two-column positions: left 0-2, right 3-5
      const chosen = [
        { cx: leftX, cy: topY, rot: '-4deg' },
        { cx: leftX, cy: midY, rot: '3deg' },
        { cx: leftX, cy: botY, rot: '-2deg' },
        { cx: rightX, cy: topY, rot: '4deg' },
        { cx: rightX, cy: midY, rot: '-3deg' },
        { cx: rightX, cy: botY, rot: '2deg' },
      ];

      // ── Glow palette (one colour per star) ──────────────────────────────────
      const palette = [
        { glow: '#fbbf24', dim: 'rgba(251,191,36,0.18)', ring: 'rgba(251,191,36,0.50)', border: 'rgba(251,191,36,0.55)' },
        { glow: '#60a5fa', dim: 'rgba(96,165,250,0.18)', ring: 'rgba(96,165,250,0.50)', border: 'rgba(96,165,250,0.55)' },
        { glow: '#c084fc', dim: 'rgba(192,132,252,0.18)', ring: 'rgba(192,132,252,0.50)', border: 'rgba(192,132,252,0.55)' },
        { glow: '#fb923c', dim: 'rgba(251,146,60,0.18)', ring: 'rgba(251,146,60,0.50)', border: 'rgba(251,146,60,0.55)' },
        { glow: '#2dd4bf', dim: 'rgba(45,212,191,0.18)', ring: 'rgba(45,212,191,0.50)', border: 'rgba(45,212,191,0.55)' },
        { glow: '#f472b6', dim: 'rgba(244,114,182,0.18)', ring: 'rgba(244,114,182,0.50)', border: 'rgba(244,114,182,0.55)' },
      ];

      (country.celebs || []).slice(0, 6).forEach((celeb, i) => {
        const pos = chosen[i];
        if (!pos) return;
        const sc = palette[i % palette.length];

        // card left/top so the orb centre lands exactly on (pos.cx, pos.cy)
        const cardLeft = Math.round(pos.cx - CARD_W / 2);
        const cardTop = pos.cy - ORB_R;

        // ── Card wrapper ──────────────────────────────────────────────────────
        const card = document.createElement('div');
        card.style.cssText = `position:absolute;left:${cardLeft}px;top:${cardTop}px;`
          + `width:${CARD_W}px;text-align:center;opacity:0;transform:rotate(${pos.rot})`;

        // ── Saturn orbit ring — centred exactly on the orb ───────────────────
        const orbit = document.createElement('div');
        orbit.style.cssText = `position:absolute;top:${ORB_R - 17}px;left:50%;`
          + `width:150px;height:34px;margin-left:-75px;border-radius:50%;`
          + `border:1px solid ${sc.ring};box-shadow:0 0 8px ${sc.glow};`
          + `transform:rotateX(68deg);`
          + `animation:orbitPulse ${2.8 + i * 0.4}s ease-in-out ${i * 0.5}s infinite;pointer-events:none`;

        // ── Planet orb (circular photo) ───────────────────────────────────────
        const orb = document.createElement('div');
        orb.style.cssText = `width:128px;height:128px;border-radius:50%;overflow:hidden;`
          + `background:rgba(10,15,35,0.85);border:2px solid ${sc.border};`
          + `margin:0 auto;position:relative;display:flex;align-items:center;justify-content:center;`
          + `--og:${sc.glow};--og2:${sc.dim};`
          + `box-shadow:0 0 20px 6px ${sc.glow},0 0 55px 16px ${sc.dim};`
          + `animation:orbGlow ${2.2 + i * 0.3}s ease-in-out ${i * 0.35}s infinite`;

        const fallbackEl = document.createElement('div');
        fallbackEl.style.cssText = 'font-size:58px;line-height:1;filter:drop-shadow(0 0 8px rgba(255,255,255,0.4))';
        fallbackEl.textContent = celeb.e;
        orb.appendChild(fallbackEl);

        // ── Name + role label ────────────────────────────────────────────────
        const nameEl = document.createElement('div');
        nameEl.style.cssText = `margin-top:10px;font-size:10.5px;font-weight:800;`
          + `color:rgba(255,255,255,0.88);font-family:'Fredoka One',cursive;`
          + `line-height:1.25;text-shadow:0 0 12px ${sc.glow},0 1px 4px rgba(0,0,0,0.95)`;
        nameEl.innerHTML = `<span style="display:inline-block;width:5px;height:5px;border-radius:50%;`
          + `background:${sc.glow};box-shadow:0 0 6px ${sc.glow};`
          + `vertical-align:middle;margin-right:4px;margin-bottom:1px"></span>${celeb.n}`;

        const roleEl = document.createElement('div');
        roleEl.style.cssText = `font-size:7.5px;color:${sc.glow};opacity:0.65;`
          + `font-family:'Nunito',sans-serif;margin-top:2px;line-height:1.3;`
          + `text-shadow:0 0 8px ${sc.glow}`;
        roleEl.textContent = celeb.r;

        card.appendChild(orbit);
        card.appendChild(orb);
        card.appendChild(nameEl);
        card.appendChild(roleEl);
        layer.appendChild(card);

        // ── Burst-in animation ───────────────────────────────────────────────
        card.animate(
          [{ opacity: 0, transform: `rotate(${pos.rot}) scale(0.3)`, filter: 'blur(8px)' },
          { opacity: 1, transform: `rotate(${pos.rot}) scale(1)`, filter: 'blur(0)' }],
          { duration: 1000, delay: i * 150 + 200, easing: 'cubic-bezier(0.34,1.56,0.64,1)', fill: 'forwards' }
        );

        // ── Real photo ───────────────────────────────────────────────────────
        const src = CELEB_IMGS[celeb.n] ?? null;
        if (src) {
          orb.innerHTML = '';
          const img = document.createElement('img');
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;object-position:top center;'
            + 'filter:brightness(0.95) saturate(1.1);opacity:0.92;display:block';
          img.onerror = () => { orb.innerHTML = ''; orb.appendChild(fallbackEl); };
          img.src = src;
          orb.appendChild(img);
          const vignette = document.createElement('div');
          vignette.style.cssText = `position:absolute;inset:0;border-radius:50%;`
            + `background:radial-gradient(circle at 50% 50%,transparent 55%,${sc.dim} 100%);pointer-events:none`;

    function startConfetti() {
      const old = document.getElementById('cf-layer');
      if (old) old.remove();
      const layer = document.createElement('div');
      layer.id = 'cf-layer';
      layer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
      document.body.appendChild(layer);

      const colors = ['#f9c74f', '#f72585', '#43e97b', '#00e5ff', '#7c3aed', '#ff6b35', '#fff700', '#ff4e50', '#ffffff', '#4ade80'];

      function burst(ox, oy, count, delayBase) {
        for (let i = 0; i < count; i++) {
          setTimeout(() => {
            const el = document.createElement('div');
            const isCircle = Math.random() > 0.6;
            const isTall = !isCircle && Math.random() > 0.5;
            const w = isCircle ? (6 + Math.random() * 8) : (5 + Math.random() * 7);
            const h = isCircle ? w : isTall ? (12 + Math.random() * 16) : (5 + Math.random() * 7);
            const color = colors[Math.floor(Math.random() * colors.length)];
            el.style.cssText = `position:absolute;width:${w}px;height:${h}px;background:${color};border-radius:${isCircle ? '50%' : '3px'};left:${ox}%;top:${oy}%`;
            layer.appendChild(el);

            const angle = Math.random() * Math.PI * 2;
            const speed = 180 + Math.random() * 480;
            const vx = Math.cos(angle) * speed;
            // bias strongly upward so it arcs dramatically
            const vy = Math.sin(angle) * speed - speed * 0.6;
            const dur = 900 + Math.random() * 1200;
            const rot = (360 + Math.random() * 720) * (Math.random() > 0.5 ? 1 : -1);

            el.animate([
              { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
              { transform: `translate(${vx * .45}px,${vy * .45 + speed * .15}px) rotate(${rot * .4}deg) scale(0.85)`, opacity: 1, offset: 0.35 },

      o2.frequency.setValueAtTime(1360, t);

      g2.gain.setValueAtTime(0.04, t);

    function playCelebration() {
      if (!_ac || _muted) return;

      // ── Clapping rhythm: 8 beats, 3 staggered noise sources per beat for crowd density ──
      for (let clap = 0; clap < 8; clap++) {
        const ct = t0 + clap * 0.22;
        for (let k = 0; k < 3; k++) {
          const jitter = k * 0.015;
          const bufLen = Math.ceil(ac.sampleRate * 0.09);
          const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
          const src = ac.createBufferSource(); src.buffer = buf;
          const bpf = ac.createBiquadFilter();
          bpf.type = 'bandpass'; bpf.frequency.value = 1200 + k * 400; bpf.Q.value = 1.2;
          const env = ac.createGain();
          env.gain.setValueAtTime(0,           ct + jitter);
          env.gain.linearRampToValueAtTime(0.28 - k * 0.04, ct + jitter + 0.006);
          env.gain.exponentialRampToValueAtTime(0.001,       ct + jitter + 0.085);
          src.connect(bpf); bpf.connect(env); env.connect(ac.destination);
          src.start(ct + jitter); src.stop(ct + jitter + 0.09);
        }

      [[523.25, 0.00, 0.18], [659.25, 0.16, 0.18], [783.99, 0.32, 0.18],

        const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
        const g = ac.createGain();
        g.gain.setValueAtTime(0, nt);
        g.gain.linearRampToValueAtTime(0.20, nt + 0.025);
        g.gain.exponentialRampToValueAtTime(0.001, nt + dur);
        o.connect(g); g.connect(ac.destination);
        o.start(nt); o.stop(nt + dur + 0.02);

      const cheerLen = Math.ceil(ac.sampleRate * 2.5);
      const cheerBuf = ac.createBuffer(1, cheerLen, ac.sampleRate);
      const cd = cheerBuf.getChannelData(0);
      for (let i = 0; i < cheerLen; i++) cd[i] = Math.random() * 2 - 1;

    // Returns [{text, pitch, rate}] objects.
    // Structure: greeting → "I'm [name], your quiz master today!" → country brief → ONE-sentence close.
    // Greeting + brief are parsed from c.intro (authored to be spoiler-free).
    // forceEnglish = true when called from the Web Speech API fallback — the fallback
    // uses an English system voice regardless of locale, so translated text sounds wrong.
    function _buildPhrases(c, forceEnglish = false) {
      const p = _VP[c.animalEmoji] ?? 1.0;  // pitch only — rate is fixed per phrase below
      const arch = _archOf(c.animalEmoji);
      const male = _isMale(c.animalEmoji);
      const { locale } = _azureVoice(c.id, male);

      // c.intro pattern: "[Greeting]! I'm [Name] the [Animal] of [Country]! [Brief]!"
      // Split on "!" to extract greeting (parts[0]) and country brief (parts[2]).
      const parts = _stripEmoji(c.intro).split('!').map(s => s.trim()).filter(Boolean);

      // Use locale-specific translated phrases when a non-English Azure voice is active.
      const lp = !forceEnglish && _LOCALE_PHRASES[locale];

      // brief: for non-English native locales use the country's native-language c.brief field;
      // for English locales (or forceEnglish whisper) fall back to the English parts[2].
      // Countries without c.brief (e.g. France whose parts[2] is a call-to-action) produce
      // an empty string → no brief phrase spoken in the native track.
      const briefEng = parts[2] ? parts[2].replace(/\.$/, '') + '.' : '';
      const brief = lp ? (c.brief ? c.brief.replace(/\.$/, '') + '.' : '') : briefEng;

      const greeting = lp?.greeting ?? ((parts[0] ?? 'Hello').replace(/^[¡¿]+/, '') + '!');

      // Pass isMale so Romance-language phrases can use the correct gendered noun.
      const masterLine = lp
        ? lp.master(c.mastername, male)
        : `I'm ${c.mastername}, your quiz master today!`;

      const close = lp ? lp.close
        : arch === 'BOLD' ? "Come on, let's begin!"
          : arch === 'PLAY' ? "Let's go, I cannot wait!"
            : arch === 'SOFT' ? 'Shall we begin together?'
              : "Think you can keep up with me?";

      const out = [];
      // Rates are intentionally slow — natural speech feels unhurried.
      // Each phrase is a separate utterance so the engine breathes between them.
      out.push({ text: greeting,    pitch: p, rate: 0.72 }); // deliberate, weighted opener
      out.push({ text: masterLine,  pitch: p, rate: 0.78 }); // warm self-introduction
      if (brief) out.push({ text: brief, pitch: p, rate: 0.76 }); // calm country tease
      out.push({ text: close,       pitch: p, rate: 0.82 }); // energetic but still measured
      return out;
    }

    // ── Soft animal ambience via Web Audio (plays while character speaks) ─────
    let _ambienceStop = null;

    function _playAnimalAmbience(emoji) {
      if (!_ac || _muted) return;
      if (_ambienceStop) { _ambienceStop(); }
      const ac = _ac, t = ac.currentTime;
      const vol = ac.createGain();
      vol.gain.setValueAtTime(0, t);
      vol.gain.linearRampToValueAtTime(0.055, t + 1.8);
      vol.connect(ac.destination);
      const living = [];

      const DEEP = ['🐘', '🦁', '🐅', '🐯', '🐂', '🦬', '🐊', '🐻', '🐆'];
      const CHIRP = ['🐓', '🦜', '🦢', '🐬', '🐧', '🦩'];
      const HOWL = ['🐺', '🦊'];
      const BOUNCE = ['🦘', '🐸', '🦌', '🦒', '🦓', '🦫', '🦦'];

      if (DEEP.includes(emoji)) {
        const base = emoji === '🐘' ? 46 : (emoji === '🦁' || emoji === '🐅' || emoji === '🐯') ? 64 : 80;
        [base, base * 1.007].forEach(f => {
          const o = ac.createOscillator(); o.type = 'sine'; o.frequency.value = f;
          const lfo = ac.createOscillator(); lfo.frequency.value = 0.55;
          const lg = ac.createGain(); lg.gain.value = 0.022;
          lfo.connect(lg); lg.connect(vol.gain);
          o.connect(vol); o.start(t); lfo.start(t);
          living.push(o, lfo);
        });

      } else if (CHIRP.includes(emoji)) {
        const base = emoji === '🐬' ? 1050 : emoji === '🐓' ? 720 : 880;
        let nx = t + 0.5;
        for (let i = 0; i < 20; i++) {
          const o = ac.createOscillator(), cg = ac.createGain(), st = nx;
          o.type = 'sine'; o.frequency.setValueAtTime(base, st); o.frequency.exponentialRampToValueAtTime(base * 1.22, st + 0.06);
          cg.gain.setValueAtTime(0.65, st); cg.gain.exponentialRampToValueAtTime(0.001, st + 0.16);
          o.connect(cg); cg.connect(vol); o.start(st); o.stop(st + 0.2);
          nx += 0.85 + Math.random() * 1.3;
        }

      } else if (HOWL.includes(emoji)) {
        const o = ac.createOscillator(), hg = ac.createGain(), st = t + 0.9;
        o.type = 'sine';
        o.frequency.setValueAtTime(170, st); o.frequency.linearRampToValueAtTime(360, st + 1.8); o.frequency.linearRampToValueAtTime(250, st + 3.1);
        hg.gain.setValueAtTime(0, st); hg.gain.linearRampToValueAtTime(0.8, st + 0.5); hg.gain.linearRampToValueAtTime(0, st + 3.4);
        o.connect(hg); hg.connect(vol); o.start(st); o.stop(st + 3.6);

      } else if (BOUNCE.includes(emoji)) {
        const base = emoji === '🦘' ? 255 : emoji === '🐸' ? 370 : 195;
        let nx = t + 0.6;
        for (let i = 0; i < 14; i++) {
          const o = ac.createOscillator(), pg = ac.createGain(), st = nx;
          o.type = 'sine'; o.frequency.value = base * (1 + Math.random() * 0.12);
          pg.gain.setValueAtTime(0.55, st); pg.gain.exponentialRampToValueAtTime(0.001, st + 0.2);
          o.connect(pg); pg.connect(vol); o.start(st); o.stop(st + 0.25);
          nx += 0.65 + Math.random() * 0.85;
        }
      }

      _ambienceStop = () => {
        vol.gain.setTargetAtTime(0, ac.currentTime, 0.5);
        living.forEach(o => setTimeout(() => { try { o.stop(); } catch (e) { } }, 1200));
        _ambienceStop = null;
      };
    }

    let _whisperAudio  = null;  // Azure: faint English shadow track played simultaneously
    let _audioStop     = null;  // Azure/AC: function to stop current AudioBufferSourceNode
    let _celebPlayed   = false; // guard: play celebration sound only once per score screen
    let _ttsKeepAlive = null; // Web Speech: Chrome keepalive interval
    let _speakToken = 0;    // incremented on each speakIntro; stale callbacks bail out
    let _btnFallback = null; // safety timer to show buttons if speech never ends

    // Reveal both quiz buttons with staggered pop animations once speech finishes.
    function _showQuizBtn() {
      clearTimeout(_btnFallback);
      const reveal = (id, delay) => {
        const btn = document.getElementById(id);
        if (!btn) return;
        setTimeout(() => {
          btn.style.opacity = '';
          btn.style.pointerEvents = '';
          btn.style.transform = '';
          btn.classList.add('quiz-btn-pop');
        }, delay);
      };
      reveal('quiz-start-btn', 0);   // main CTA pops first
      reveal('quiz-again-btn', 160); // secondary option follows shortly after

    // Primary: Azure Cognitive Services TTS (natural, regional, gender-matched voices).
    // Fallback: Web Speech API (used automatically if no Azure key is configured).
    async function speakIntro(country) {

      _ensureAC(); // Resume AudioContext on the current task — safe even outside user gesture

      stopSpeech();
      const token = ++_speakToken;

      // Safety net: show buttons after 30 s even if speech never fires onended.
      clearTimeout(_btnFallback);
      _btnFallback = setTimeout(_showQuizBtn, 30000);

        try {
          const allPhrases  = _buildPhrases(country);
          const introPhrases  = allPhrases.slice(0, -1); // all but the closing line
          const closingPhrase = allPhrases.slice(-1);    // the "Let's go!" line

          const azFetch = ssml => fetch(
            `https://${AZURE_REGION}.tts.speech.microsoft.com/cognitiveservices/v1`,
            {
              method: 'POST',
              headers: {
                'Ocp-Apim-Subscription-Key': AZURE_KEY,
                'Content-Type': 'application/ssml+xml',
                'X-Microsoft-OutputFormat': 'audio-24khz-48kbitrate-mono-mp3',
              },
              body: ssml,
            }
          );

          // Kids can follow along — the whisper plays simultaneously at ~20% volume.
          const { locale: mainLocale } = _azureVoice(country.id, _isMale(country.animalEmoji));
          const needsWhisper = !mainLocale.startsWith('en-');

          // Fetch all segments in parallel to eliminate gaps and start playback ASAP
          const fetchResults = await Promise.all([
            azFetch(_buildSSML(country, introPhrases)),
            azFetch(_buildSSML(country, closingPhrase)),
            ...(needsWhisper ? [azFetch(_buildWhisperSSML(country))] : []),
          ]);

          if (token !== _speakToken) return;
          if (fetchResults.some(r => !r.ok)) throw new Error(`Azure fetch failed: ${fetchResults.map(r => r.status).join('/')}`);

          const blobs = await Promise.all(fetchResults.map(r => r.blob()));
          if (token !== _speakToken) return;

          // Safari blocks new Audio().play() after any await (user-gesture window
          // has expired by then). AudioContext.decodeAudioData + BufferSourceNode
          // bypasses that restriction entirely — _ac was resumed synchronously on
          // the user's click gesture via _ensureAC() in the global click handler.
          const [ab0, ab1] = await Promise.all([
            blobs[0].arrayBuffer(), blobs[1].arrayBuffer(),
          ]);
          const [buf0, buf1] = await Promise.all([
            _ac.decodeAudioData(ab0), _ac.decodeAudioData(ab1),
          ]);
          let wBuf = null;
          if (blobs[2]) wBuf = await _ac.decodeAudioData(await blobs[2].arrayBuffer());
          if (token !== _speakToken) return;

          _currentAudio = null; // not using HTMLAudioElement; _audioStop() handles stop
          _playAnimalAmbience(country.animalEmoji);

          const vol = _ac.createGain();
          vol.gain.value = 1.0;
          vol.connect(_ac.destination);

          // Whisper track — simultaneous at low volume
          if (wBuf) {
            const wVol = _ac.createGain();
            wVol.gain.value = 0.20;
            wVol.connect(_ac.destination);
            const wSrc = _ac.createBufferSource();
            wSrc.buffer = wBuf;
            wSrc.connect(wVol);
            wSrc.start();
          }

          // Intro phrases (greeting + master intro)
          const src0 = _ac.createBufferSource();
          src0.buffer = buf0;
          src0.connect(vol);
          src0.onended = () => {
            if (token !== _speakToken) return;
            // Buttons appear exactly as the closing phrase starts playing
            _showQuizBtn();
            const src1 = _ac.createBufferSource();
            src1.buffer = buf1;
            src1.connect(vol);
            src1.onended = () => { if (_ambienceStop) _ambienceStop(); };
            src1.start();
            _audioStop = () => { try { src1.stop(); } catch(e) {} };
          };
          src0.start();
          _audioStop = () => { try { src0.stop(); } catch(e) {} };
          return;
        } catch (err) {
          console.warn('Azure TTS failed, falling back to Web Speech API:', err);
          if (token !== _speakToken) return;
        }
      }

      // ── Web Speech API fallback ───────────────────────────────────────────
      if (!('speechSynthesis' in window)) { setTimeout(_showQuizBtn, 300); return; }
      window.speechSynthesis.cancel();

      setTimeout(() => {
        if (token !== _speakToken) return;

        const male = _isMale(country.animalEmoji);
        const isNative = v => !/google/i.test(v.name);
        const maleNames = /alex|daniel|oliver|fred|tom|bruce|ralph|gordon|david/i;
        const femaleNames = /samantha|karen|tessa|moira|victoria|fiona|kate|serena|veena/i;
        const nameMatch = male ? maleNames : femaleNames;
        const voice =
          _voices.find(v => v.lang.startsWith('en') && isNative(v) && nameMatch.test(v.name)) ||
          _voices.find(v => v.lang.startsWith('en') && isNative(v)) ||
          _voices.find(v => v.lang.startsWith('en') && nameMatch.test(v.name)) ||
          _voices.find(v => v.lang.startsWith('en')) || null;

        const phrases = _buildPhrases(country, true); // force English — Web Speech has no locale-matched voice
        _playAnimalAmbience(country.animalEmoji);

        phrases.forEach((p, i) => {
          const u = new SpeechSynthesisUtterance(p.text);
          u.pitch = p.pitch; u.rate = p.rate; u.volume = 0.92;
          if (voice) u.voice = voice;
          if (i === phrases.length - 1) {
            u.onend = () => { clearInterval(_ttsKeepAlive); if (_ambienceStop) _ambienceStop(); _showQuizBtn(); };
          }
          window.speechSynthesis.speak(u);
        });

        clearInterval(_ttsKeepAlive);
        _ttsKeepAlive = setInterval(() => {
          if (!window.speechSynthesis.speaking) { clearInterval(_ttsKeepAlive); return; }
          window.speechSynthesis.pause(); window.speechSynthesis.resume();
        }, 10000);
      }, 100);
    }

    function stopSpeech() {
      _speakToken++;
      clearTimeout(_btnFallback);
      clearInterval(_ttsKeepAlive);
      if (_audioStop)    { _audioStop(); _audioStop = null; }
      if (_currentAudio) { _currentAudio.pause(); _currentAudio.src = ''; _currentAudio = null; }
      if (_whisperAudio) { _whisperAudio.pause(); _whisperAudio.src = ''; _whisperAudio = null; }
      window.speechSynthesis?.cancel();
      if (_ambienceStop) _ambienceStop();
    }

    // ── FORTUNE EGG ──────────────────────────────────────

    function playCrack() {
      if (!_ac || _muted) return;
      const ac = _ac, t = ac.currentTime;
      const bufLen = Math.floor(ac.sampleRate * 0.14);
      const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
      const src = ac.createBufferSource();
      src.buffer = buf;
      const filter = ac.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1400;
      filter.Q.value = 0.9;
      const g = ac.createGain();
      g.gain.setValueAtTime(0.55, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      src.connect(filter); filter.connect(g); g.connect(ac.destination);
      src.start(t); src.stop(t + 0.15);
    }

    let _eggTimer = null;
    function _cancelEgg() {
      if (_eggTimer) { clearTimeout(_eggTimer); _eggTimer = null; }
    }

    // Egg layout: normalized (x,y) positions within the basket circle (-1 to +1)
    // Dynamic concentric-ring layout — works for any egg count
    function _genEggLayout(n, Rx, Ry) {
      const eW = n > 30 ? 54 : n > 15 ? 64 : 76;
      const eH = n > 30 ? 40 : n > 15 ? 48 : 56;
      const rings = [
        {r:0.00, cap:1 },
        {r:0.30, cap:6 },
        {r:0.55, cap:11},
        {r:0.76, cap:16},
        {r:0.90, cap:20},
      ];
      const layout = [];
      let placed = 0;
      for (let ri = 0; ri < rings.length && placed < n; ri++) {
        const {r, cap} = rings[ri];
        const cnt = Math.min(cap, n - placed);
        const phase = ri * 0.45;
        for (let i = 0; i < cnt; i++) {
          const a = (2 * Math.PI * i / cnt) + phase;
          layout.push({
            left: Math.round(Rx + (r === 0 ? 0 : r * Rx * 0.82 * Math.cos(a)) - eW / 2),
            top:  Math.round(Ry + (r === 0 ? 0 : r * Ry * 0.82 * Math.sin(a)) - eH / 2),
            rot:  Math.round(-30 + (placed * 19) % 60),
            eW, eH,
          });
          placed++;
        }
      }
      return layout;
    }

    function initBasket() {
      const circle = document.getElementById('basket-circle');
      if (!circle) return;

      const W  = circle.offsetWidth;
      const H  = circle.offsetHeight;
      const Rx = W / 2, Ry = H / 2;

      // ── Position & rotate eggs ──
      const eggs = circle.querySelectorAll('.game-egg');
      const layout = _genEggLayout(eggs.length, Rx, Ry);
      eggs.forEach((egg, i) => {
        const {left, top, rot, eW, eH} = layout[i] || layout[0];
        egg.style.width     = eW + 'px';
        egg.style.height    = eH + 'px';
        egg.style.left      = left + 'px';
        egg.style.top       = top  + 'px';
        egg.style.transform = `rotate(${rot}deg)`;
        egg.style.setProperty('--egg-rot', `rotate(${rot}deg)`);
      });

      // ── Create Easter grass strands ──
      const GRASS  = ['#4CAF50','#66BB6A','#A5D6A7','#C8E6C9','#FFEB3B','#FFF59D','#F8BBD0','#CE93D8','#80DEEA','#FFCC80'];
      const count  = Math.max(45, eggs.length * 5);
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        const w = 2.2 + Math.random() * 2;
        const l = 26 + Math.random() * 44;
        const r = Math.random() * 0.88 * Math.min(Rx, Ry);
        const a = Math.random() * Math.PI * 2;
        s.style.cssText =
          `position:absolute;width:${w}px;height:${l}px;
           background:${GRASS[i % GRASS.length]};border-radius:${w/2}px;
           left:${Math.round(Rx + Math.cos(a)*r - w/2)}px;
           top:${Math.round(Ry + Math.sin(a)*r - l/2)}px;
           transform:rotate(${Math.random()*360}deg);
           opacity:${0.6 + Math.random()*0.3};pointer-events:none;z-index:0;`;
        circle.appendChild(s);
      }

      // ── Hammer cursor ──
      const cc = document.createElement('canvas');
      cc.width = 40; cc.height = 40;
      const ctx = cc.getContext('2d');
      ctx.font = '30px serif'; ctx.fillText('🔨', 2, 30);
      circle.style.cursor = `url(${cc.toDataURL()}) 4 36, crosshair`;

      // ── Pre-pick winner (before any click) ──
      const pool   = COUNTRIES.filter(c => c.continent === S.continent);
      const winner = pool[Math.floor(Math.random() * pool.length)];

      // ── Attach click handlers to each egg ──
      const pColors = ['#ff6b9d','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43','#ff4d4d','#00d4aa'];

      eggs.forEach(egg => {
        egg.addEventListener('click', function handleSmash() {
          eggs.forEach(e => { e.style.pointerEvents = 'none'; });
          _ensureAC();

          // Surprise-bounce all other eggs
          eggs.forEach(e => {
            if (e !== egg) {
              e.classList.add('egg-surprised');
              e.addEventListener('animationend', () => e.classList.remove('egg-surprised'), { once: true });
            }
          });

          // 1. Shake
          egg.classList.add('egg-cracking');

          // 2. Crack lines + crunch sound
          _eggTimer = setTimeout(() => {
            egg.querySelectorAll('.egg-crack-svg').forEach(s => s.style.opacity = '1');
            playCrack();

            // 3. Explode + confetti
            _eggTimer = setTimeout(() => {
              egg.classList.remove('egg-cracking');
              egg.classList.add('egg-open');

              const eR  = egg.getBoundingClientRect();
              const cR  = circle.getBoundingClientRect();
              const ecx = eR.left - cR.left + eR.width  / 2;
              const ecy = eR.top  - cR.top  + eR.height / 2;

              for (let i = 0; i < 18; i++) {
                const p   = document.createElement('div');
                const ang = (i / 18) * Math.PI * 2;
                const d   = 50 + Math.random() * 60;
                const sz  = 6 + Math.random() * 8;
                // mix circles and rectangles
                const isRect = i % 3 === 0;
                p.className = 'egg-particle';
                p.style.cssText =
                  `width:${sz}px;height:${isRect ? sz*0.5 : sz}px;
                   background:${pColors[i % pColors.length]};
                   border-radius:${isRect ? '2px' : '50%'};
                   left:${Math.round(ecx - sz/2)}px;top:${Math.round(ecy - sz/2)}px;
                   --pdx:${Math.round(Math.cos(ang)*d)}px;
                   --pdy:${Math.round(Math.sin(ang)*d)}px;`;
                circle.appendChild(p);
                setTimeout(() => p.remove(), 800);
              }

              // 4. Country reveal card
              document.getElementById('reveal-flag').textContent = winner.flag;
              document.getElementById('reveal-name').textContent = winner.name;
              document.getElementById('reveal-capital').textContent = '🏛️ ' + winner.capital;
              document.getElementById('country-reveal').classList.add('reveal-open');
              playClick();

              // 5. Auto-advance
              _eggTimer = setTimeout(() => go('globe', { country: winner }), 1700);
            }, 280);
          }, 500);
        });
      });
    }

    // ── EVENT DELEGATION ──
    app.addEventListener('click', e => {
      _ensureAC();
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const { action, value } = btn.dataset;

      if (action === 'start') { playClick(); go('continentSelect'); }
      if (action === 'continent') { playClick(); go('cardDraw', { continent: value, country: null }); }
      if (action === 'meet') { playClick(); go('quizIntro'); }
      if (action === 'start-quiz') {
        stopSpeech(); playClick();
        // Pick 3 random questions from the pool of 12 — different every game!
        const pool = [...S.country.questions].sort(() => Math.random() - 0.5).slice(0, 3);
        const shuffledQs = pool.map(q => {
          const idxs = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
          return { ch: idxs.map(i => q.ch[i]), a: idxs.indexOf(q.a), cat: q.cat, q: q.q };
        });
        go('quiz', { qIdx: 0, score: 0, answered: null, shuffledQs });
      }
      if (action === 'answer') {
        if (S.answered !== null) return;
        const idx = parseInt(value);
        const correct = S.shuffledQs[S.qIdx].a;
        S.answered = idx;
        S.score += (idx === correct) ? 1 : 0;

        if (idx === correct) playCorrect(); else playWrong();

        // Stop typewriter and show full question text in place
        clearInterval(_tw);
        const qtextEl = document.getElementById('qtext');
        if (qtextEl) qtextEl.textContent = S.shuffledQs[S.qIdx].q;
        document.querySelector('.cursor')?.remove();

        // Update answer buttons in place — no full re-render needed
        app.querySelectorAll('[data-action="answer"]').forEach((el, i) => {
          el.classList.add('locked');
          const pill = el.querySelector('.opt-pill');
          if (i === correct) {
            el.classList.add('correct');
            if (pill) pill.textContent = '✅';
          } else if (i === idx) {
            el.classList.add('wrong');
            if (pill) pill.textContent = '❌';
          }
        });

        // Bounce character happily
        const charEl = app.querySelector('.qm-talk');
        if (charEl) { charEl.classList.remove('qm-talk'); charEl.classList.add('qm-happy'); }

        setTimeout(() => {
          S.answered = null;
          if (S.qIdx < 2) go('quiz', { qIdx: S.qIdx + 1 });
          else go('scoreScreen');
        }, 1600);
      }
      if (action === 'restart') { playClick(); go('welcome', { continent: null, country: null, qIdx: 0, score: 0, answered: null, shuffledQs: null }); }
      if (action === 'again') { playClick(); go('cardDraw', { country: null, qIdx: 0, score: 0, answered: null, shuffledQs: null }); }
    });

      ${renderChar(c, 200, 'qm-float')}
    </div>
    <div class="glass bubble-pop" style="background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.13);border-radius:20px;padding:20px 24px;max-width:380px">
      <div style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.55">${c.intro}</div>
    </div>
    <button id="quiz-start-btn" class="btn-gold" data-action="start-quiz"
      style="opacity:0;pointer-events:none;transform:scale(0.25) translateY(24px)">Let's Go! 🎯</button>
    <button id="quiz-again-btn" class="btn-outline" data-action="again"
      style="font-size:13px;padding:8px 18px;opacity:0;pointer-events:none;transform:scale(0.25) translateY(24px)">Draw a Different Card</button>
  </div>`;
    }

    function quiz() {
      const c = S.country;
      const q = S.shuffledQs[S.qIdx];
      const dots = [0, 1, 2].map(i => {
        if (i < S.qIdx) return `<div class="pdot pdot-done"></div>`;
        if (i === S.qIdx) return `<div class="pdot pdot-active"></div>`;
        return `<div class="pdot pdot-todo"></div>`;
      }).join('');

      const letters = ['A', 'B', 'C', 'D'];
      const opts = q.ch.map((ch, i) => `
    <div class="opt" data-action="answer" data-value="${i}">
      <span class="opt-pill">${letters[i]}</span> ${ch}
    </div>`).join('');

      return `
  <div style="display:flex;align-items:center;gap:32px;max-width:1040px;width:100%;flex-wrap:wrap;justify-content:center">

    <!-- CHARACTER LEFT -->
    <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px">
      ${renderChar(c, 170, 'qm-talk')}
    </div>

    <!-- QUIZ RIGHT -->
    <div style="flex:1;min-width:280px;max-width:480px;display:flex;flex-direction:column;gap:12px">

      <!-- Progress bar -->
      <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:16px">
        <span style="font-size:26px">${c.flag}</span>
        <div style="flex:1">
          <div class="tf" style="font-size:16px;color:#fff">${c.name}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4)">Score: ${S.score} / ${S.qIdx}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">${dots}</div>
      </div>

      <!-- Speech bubble -->
      <div class="glass bubble-pop" style="background:rgba(255,255,255,0.95);border-radius:20px;padding:18px 20px;position:relative">
        <div style="display:flex;gap:7px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
          <span style="background:#dbeafe;color:#1d4ed8;font-family:'Fredoka One',cursive;font-size:13px;padding:4px 12px;border-radius:20px">Q${S.qIdx + 1} of 3</span>
          <span style="background:#fef9c3;color:#854d0e;font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px">${q.cat}</span>
        </div>
        <div class="tf" style="font-size:clamp(16px,3vw,20px);color:#1e293b;line-height:1.4">
          <span id="qtext"></span><span class="cursor"></span>
        </div>
      </div>

      <!-- Answers -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${opts}
      </div>
    </div>
  </div>`;
    }

    function scoreScreen() {
      const c = S.country;
      const s = S.score;

      const messages = [
        { title: 'Keep Going!', sub: 'Every explorer starts somewhere! 🗺️', emoji: '✨✨✨', bg: 'linear-gradient(145deg,#92400e,#78350f)', anim: 'qm-float' },
        { title: 'Good Try!', sub: `${c.mastername} believes in you! 💪`, emoji: '⭐✨✨', bg: 'linear-gradient(145deg,#1e3a5f,#0f2942)', anim: 'qm-float' },
        { title: 'Great Job!', sub: `${c.mastername} thinks you're amazing! 🎉`, emoji: '⭐⭐✨', bg: 'linear-gradient(145deg,#0f766e,#065f46)', anim: 'qm-float' },
        { title: 'AMAZING!', sub: `${c.mastername} is SO proud of you! 🌟`, emoji: '⭐⭐⭐', bg: 'linear-gradient(145deg,#7c3aed,#4c1d95,#312e81)', anim: 'qm-happy' },
      ];
      const m = messages[s];

      return `
  <div style="text-align:center;max-width:420px;width:100%;border-radius:32px;padding:36px 28px;position:relative;overflow:hidden;background:${m.bg};border:1px solid rgba(255,255,255,0.15);box-shadow:0 30px 80px rgba(0,0,0,0.5)">
    <div style="position:relative;z-index:1">
      <div class="${m.anim}" style="display:inline-block;margin-bottom:8px">
        ${renderChar(c, 140, '')}
      </div>
      <div class="tf" style="font-size:clamp(28px,8vw,42px);color:#fff;margin-bottom:4px">${m.title}</div>
      <div style="font-size:15px;color:rgba(255,255,255,0.85);margin-bottom:16px">${m.sub}</div>
      <div style="font-size:40px;letter-spacing:5px;margin-bottom:16px">${m.emoji}</div>
      <div style="background:rgba(255,255,255,0.15);border-radius:60px;padding:10px 28px;display:inline-block;margin-bottom:18px">
        <span class="tf" style="font-size:24px;color:#fff">${s} / 3 Correct!</span>
      </div>
      <div style="background:rgba(0,0,0,0.2);border-radius:14px;padding:12px 16px;margin-bottom:20px;text-align:left">
        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);margin-bottom:4px">🧠 Fun Fact from ${c.mastername}:</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.9);line-height:1.55">${c.funFact}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn-green" data-action="again">🃏 Draw Another Card</button>
        <button class="btn-outline" data-action="start">🌍 Choose New Continent</button>
        <button class="btn-outline" data-action="restart" style="opacity:0.6;font-size:14px;padding:8px 18px">Start Over</button>
      </div>
    </div>
  </div>`;
    }

    // ═══════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════

    // Restore state from URL on first load (supports refresh & direct links)
    Object.assign(S, hashToState());
    render();

    // Browser back / forward navigation
    window.addEventListener('popstate', () => {
      stopSpeech();
      const fresh = { qIdx: 0, score: 0, answered: null, shuffledQs: null };
      Object.assign(S, fresh, hashToState());
      render();
    });

    // ── DEEP SPACE STAR FIELD ──────────────────────────────
    const starsEl = document.getElementById('stars');
    const rnd = (a, b) => a + Math.random() * (b - a);

    // Tier 1 — dust cloud (180 tiny, barely-there stars)
    for (let i = 0; i < 180; i++) {
      const el = document.createElement('div');
      const sz = rnd(0.5, 1.2);
      const col = Math.random() > 0.85 ? '#ffe8b0' : (Math.random() > 0.85 ? '#c8daff' : '#ffffff');
      el.style.cssText = `position:absolute;left:${rnd(0, 100)}%;top:${rnd(0, 100)}%;width:${sz}px;height:${sz}px;border-radius:50%;background:${col};opacity:${rnd(0.12, 0.35)};animation:twinkleSm ${rnd(4, 9)}s ease-in-out ${rnd(0, 8)}s infinite`;
      starsEl.appendChild(el);
    }

    // Tier 2 — medium visible stars (80) with subtle glow
    const mdColors = ['#ffffff', '#ffffff', '#ffffff', '#ffe8b0', '#c8daff', '#b8f0e8'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      const sz = rnd(1.5, 3.2);
      const col = mdColors[Math.floor(Math.random() * mdColors.length)];
      el.style.cssText = `position:absolute;left:${rnd(0, 100)}%;top:${rnd(0, 100)}%;width:${sz}px;height:${sz}px;border-radius:50%;background:${col};--sc:${col};opacity:.75;box-shadow:0 0 ${sz * 1.8}px ${col};animation:twinkleMd ${rnd(2.5, 6)}s ease-in-out ${rnd(0, 6)}s infinite`;
      starsEl.appendChild(el);
    }

    // Tier 3 — bright stars (18) with strong coloured glow
    const lgPairs = [['#fff7d0', 'rgba(255,220,100,0.5)'], ['#ddeeff', 'rgba(160,200,255,0.5)'], ['#ffffff', 'rgba(255,255,255,0.45)'], ['#ffe4b0', 'rgba(255,200,80,0.4)'], ['#e0d4ff', 'rgba(180,140,255,0.45)']];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      const sz = rnd(3.5, 6.5);
      const [col, glow] = lgPairs[Math.floor(Math.random() * lgPairs.length)];
      el.style.cssText = `position:absolute;left:${rnd(2, 98)}%;top:${rnd(2, 98)}%;width:${sz}px;height:${sz}px;border-radius:50%;background:${col};--sc:${glow};opacity:1;box-shadow:0 0 ${sz * 2}px ${sz / 2}px ${glow};animation:twinkleLg ${rnd(1.8, 4.5)}s ease-in-out ${rnd(0, 5)}s infinite`;
      starsEl.appendChild(el);
    }

    // Tier 4 — hero / brilliant stars (6) with radiant cross-glow
    const heroData = [
      { x: 8, y: 12, sc: 'rgba(255,230,120,0.8)', sc2: 'rgba(255,180,50,0.25)', sz: 10 },
      { x: 91, y: 7, sc: 'rgba(180,210,255,0.9)', sc2: 'rgba(100,160,255,0.25)', sz: 12 },
      { x: 3, y: 58, sc: 'rgba(255,255,255,0.95)', sc2: 'rgba(200,220,255,0.3)', sz: 9 },
      { x: 95, y: 52, sc: 'rgba(255,210,140,0.85)', sc2: 'rgba(255,160,60,0.25)', sz: 11 },
      { x: 20, y: 90, sc: 'rgba(200,240,255,0.9)', sc2: 'rgba(120,200,255,0.25)', sz: 8 },
      { x: 78, y: 88, sc: 'rgba(255,240,200,0.9)', sc2: 'rgba(255,200,100,0.25)', sz: 10 },
    ];
    heroData.forEach(({ x, y, sc, sc2, sz }) => {
      const el = document.createElement('div');
      // Cross-glow via two overlapping box-shadow spreads
      el.style.cssText = `position:absolute;left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;border-radius:50%;background:#fff;--sc:${sc};--sc2:${sc2};animation:twinkleHero ${rnd(2, 4.5)}s ease-in-out ${rnd(0, 3)}s infinite`;
      // Cross sparkle arms (horizontal & vertical lines via pseudo — done with extra divs)
      ['h', 'v'].forEach(dir => {
        const arm = document.createElement('div');
        const len = sz * 5;
        arm.style.cssText = dir === 'h'
          ? `position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:${len}px;height:1px;background:linear-gradient(90deg,transparent,${sc},transparent);opacity:0.6`
          : `position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:${len}px;background:linear-gradient(180deg,transparent,${sc},transparent);opacity:0.6`;
        el.appendChild(arm);
      });
      starsEl.appendChild(el);
    });

    // Shooting stars — spawn one every 5-12 seconds
    function spawnShootingStar() {
      const el = document.createElement('div');
      const startX = rnd(10, 70), startY = rnd(2, 30);
      el.style.cssText = `position:absolute;left:${startX}%;top:${startY}%;width:90px;height:1.5px;background:linear-gradient(90deg,rgba(255,255,255,0.9),rgba(255,255,255,0));border-radius:2px;transform-origin:left center;animation:shootStar ${rnd(0.6, 1.1)}s linear forwards`;
      starsEl.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }
    setTimeout(function loop() { spawnShootingStar(); setTimeout(loop, rnd(5000, 12000)); }, rnd(3000, 8000));
  </script>
</body>

</html>
